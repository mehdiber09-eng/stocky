apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: your-registry/stockout-backend:latest
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://postgres:postgres@postgres:5432/stockdb
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: SECRET_KEY
              value: "change-me"
          ports:
            - containerPort: 8000
